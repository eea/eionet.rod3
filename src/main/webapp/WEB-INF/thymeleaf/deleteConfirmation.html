<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: headerFragment}">
</head>
<body>
<div id="container">
    <div th:replace="~{layout :: bannerFragment}">
    </div>
    <div id="workarea">
        <h1>Confirm deletion</h1>
        <p>
            Please click the button below to remove the file.
        </p>
        <form action="#" th:action="@{/deletefiles}" method="POST">
            <div>
                <input type="hidden" th:name="id" th:value="${uuid}"/>
                <input type="submit" value="Delete"/>
            </div>
        </form>
        <p>
            Return to <a href="index.html" th:href="@{/}">Home</a>.
        </p>
    </div>
</div>
<!-- container -->
<div id="pagefoot" th:replace="~{layout :: footerFragment}">
    Footer
</div>
</body>
</html>
